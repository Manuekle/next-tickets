name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npx prisma generate --schema=apps/api/prisma/schema.prisma
      - name: Push API to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN not set — skipping HF deploy"
            exit 0
          fi
          git clone https://user:$HF_TOKEN@huggingface.co/spaces/manujsx/next-tickets /tmp/hf-deploy
          rsync -av \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.next' \
            --exclude='.turbo' \
            ./ /tmp/hf-deploy/
          cd /tmp/hf-deploy
          git config user.email "ci@next-tickets.com"
          git config user.name "CI Bot"
          git add -A
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to HF Space"
          else
            git commit -m "deploy: ${{ github.sha }}"
            git push
            echo "✅ HF Space updated — rebuilding..."
          fi
